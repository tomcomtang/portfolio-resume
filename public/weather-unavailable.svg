<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Partly cloudy">
  <!-- Transparent background by default -->
  <defs>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="cloudStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Sun (behind cloud) -->
  <g stroke="#f59e0b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="86" cy="92" r="26" fill="#fbbf24"/>
    <path d="M86 44v16"/>
    <path d="M86 124v16"/>
    <path d="M38 92h16"/>
    <path d="M118 92h16"/>
    <path d="M52.5 58.5l11.3 11.3"/>
    <path d="M108.2 114.2l11.3 11.3"/>
    <path d="M119.5 58.5l-11.3 11.3"/>
    <path d="M63.8 114.2l-11.3 11.3"/>
  </g>

  <!-- Cloud (front) -->
  <g stroke="url(#cloudStroke)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path
      d="M86 176h92c20 0 36-16 36-36 0-18-13-33-30-36-7-30-34-52-67-52-33 0-61 22-68 53-18 4-31 20-31 39 0 22 18 40 40 40h28"
      fill="url(#cloudFill)"
      opacity="0.98"
    />
  </g>
</svg>
